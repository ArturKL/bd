version: '3.8'

services:
  primary:
    image: postgres:16
    container_name: pg_primary
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpass
      POSTGRES_DB: course_db
    ports:
      - "15432:5432"
    volumes:
      - primary_data:/var/lib/postgresql/data
  # wal_level=replica для physical streaming replication
    command: >
      postgres
      -c wal_level=logical
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby=on
      -c listen_addresses='*'

  replica1:
    image: postgres:16
    container_name: pg_replica1
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpass
    ports:
      - "15433:5432"
    volumes:
      - replica1_data:/var/lib/postgresql/data
    depends_on:
      - primary

  replica2:
    image: postgres:16
    container_name: pg_replica2
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpass
    ports:
      - "15434:5432"
    volumes:
      - replica2_data:/var/lib/postgresql/data
    depends_on:
      - primary

volumes:
  primary_data:
  replica1_data:
  replica2_data: